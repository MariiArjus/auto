<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Autorent - Rendi auto soodsalt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Autorent</div>
        <ul class="nav-links">
            <li><a href="#">Avaleht</a></li>
            <li><a href="#">Autod</a></li>
            <li><a href="#">Hinnad</a></li>
            <li><a href="#">Kontakt</a></li>
        </ul>
        <div class="search-bar">
            <input type="text" placeholder="Otsi autot...">
            <button>🔍</button>
        </div>
    </nav>

    <main class="container">
        <section class="hero">
            <div class="hero-text">
                <h1>Rendi auto soodsalt</h1>
                <p>Lai valik usaldusväärseid autosid igaks olukorraks.</p>
                <button class="btn-primary">Vaata autosid</button>
            </div>
            <div class="hero-image">
                <img src="porsche_race.jpg" alt="Hero pilt">
            </div>
        </section>

        <div class="car-grid">
            <article class="car-card">
                <div class="card-img">
                    <img src="audi_q8.jpg" alt="Audi Q8">
                    <span class="heart-icon">♡</span>
                </div>
                <div class="card-content">
                    <h3>Audi Q8</h3>
                    <p class="car-type">Crossover · 2019</p>
                    <div class="specs">
                        <p>Mootor: V6</p>
                        <p>Kütus: Bensiin</p>
                        <p><strong>Hind: 120 €/päev</strong></p>
                    </div>
                    <button class="btn-rent">Rendi</button>
                </div>
            </article>
            
            </div>

        <div class="pagination">
            <button disabled>Eelmine</button>
            <button class="active">1</button>
            <button>2</button>
            <button>3</button>
            <button>Järgmine</button>
        </div>
    </main>

</body>
</html>
